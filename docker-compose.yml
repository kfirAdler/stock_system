services:
  stock-system:
    build: .
    container_name: stock-system
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:5000"
    environment:
      PORT: 5000
      OUTPUT_DIR: /data/output
      DATA_PROVIDER_MODE: ${DATA_PROVIDER_MODE:-auto}
      SAVE_TO_SUPABASE: ${SAVE_TO_SUPABASE:-false}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me}
    volumes:
      - ./data-output:/data/output
