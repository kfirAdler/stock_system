services:
  - type: web
    name: stock-system-dashboard
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard.wsgi:app --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: OUTPUT_DIR
        value: /var/data/output
      - key: SAVE_TO_SUPABASE
        value: "false"
    disk:
      name: stock-system-data
      mountPath: /var/data
      sizeGB: 2
